name: AI Code Review + 企业微信推送

on:
  push:
    branches:
      - dev
      - test
      - main
      - master

jobs:
  ai-review:
    runs-on: ubuntu-latest
    timeout-minutes: 4

    steps:
      - name: 拉取代码
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: 获取本次修改文件
        id: diff
        run: |
          echo "files=$(git diff --name-only HEAD^ HEAD)" >> $GITHUB_OUTPUT

      - name: 获取代码差异
        id: gitdiff
        run: |
          echo "diffcontent<<EOF" >> $GITHUB_OUTPUT
          git diff HEAD^ HEAD >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: 通义千问 AI Code Review
        id: ai
        uses: x-dr/ai-code-review@main
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_BASE_URL: https://dashscope.aliyuncs.com/compatible-mode/v1
          MODEL: qwen-plus
          PROMPT: |
            你是Cursor风格的AI代码审查员，请用中文审查以下代码：
            指出问题、风险、优化建议，简洁明了。

      - name: 发送结果到企业微信
        uses: charmcter/wechat-work-webhook-action@main
        with:
          webhook: ${{ secrets.WECHAT_WEBHOOK }}
            content: |
            🚀 AI 代码审查完成
            分支：${{ github.ref }}
            提交人：${{ github.actor }}
            修改文件：${{ steps.diff.outputs.files }}
            
            🔍 AI 审查意见：
            ${{ steps.ai.outputs.result }}