name: AI Code Review + 企业微信推送
on:
  push:
    branches: [ dev, test, main, master ]

jobs:
  review:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with: 
          fetch-depth: 2 # 确保能获取到上一次提交

      - name: 获取代码差异
        id: diff
        run: |
          # 获取差异并保存为文件，避免命令行长度限制和转义问题
          git diff HEAD^ HEAD > diff_output.txt
          # 如果差异过大，截取前 300 行以防超时或令牌超限
          head -n 300 diff_output.txt > diff_limited.txt
          echo "diff_file=diff_limited.txt" >> $GITHUB_OUTPUT

      - name: 通义千问 AI 审查 (安全版)
        id: ai
        env:
          # ⚠️ 请确保在 GitHub Secrets 中配置的是阿里云百炼的 API Key
          # 建议将 Secret 名字改为 ALIYUN_API_KEY 以示区分
          QWEN_KEY: ${{ secrets.OPENAI_API_KEY }} 
        run: |
          # 1. 读取差异内容
          DIFF_CONTENT=$(cat ${{ steps.diff.outputs.diff_file }})
          
          # 2. 使用 jq 安全地构建 JSON 负载 (自动处理换行、引号转义)
          # 这样即使代码里有双引号也不会破坏 JSON 结构
          jq -n --arg diff "$DIFF_CONTENT" '{
            "model": "qwen-plus",
            "input": {
              "messages": [
                {"role": "system", "content": "你是资深前端代码审查员。请用简洁的中文指出代码中的：1. 潜在 Bug 2. 安全风险 3. 性能优化建议。如果没有重大问题，回复“代码质量良好”."},
                {"role": "user", "content": $diff}
              ]
            },
            "parameters": {"max_tokens": 1000}
          }' > payload.json

          # 3. 发送请求
          RESPONSE=$(curl -s -X POST https://dashscope.aliyuncs.com/api/v1/services/aigc/text-generation/generation \
            -H "Authorization: Bearer $QWEN_KEY" \
            -H "Content-Type: application/json" \
            -d @payload.json)

          # 4. 调试：打印原始响应以便排查 (如果失败看这里)
          echo "API Response:"
          echo "$RESPONSE"

          # 5. 解析结果
          # 检查是否有 error 字段
          if echo "$RESPONSE" | jq -e '.output.text' > /dev/null 2>&1; then
            RESULT=$(echo "$RESPONSE" | jq -r '.output.text')
            echo "result=$RESULT" >> $GITHUB_OUTPUT
            echo "✅ AI 审查成功"
          else
            # 提取错误信息
            ERROR_MSG=$(echo "$RESPONSE" | jq -r '.message // .code // "未知错误"')
            echo "::error::AI 审查失败：$ERROR_MSG"
            echo "result=❌ AI 审查失败：$ERROR_MSG" >> $GITHUB_OUTPUT
          fi

      - name: 发送企业微信
        if: always() # 即使 AI 失败也发送通知
        env:
          WEBHOOK: ${{ secrets.WECHAT_WEBHOOK }}
          RESULT: ${{ steps.ai.outputs.result }}
          BRANCH: ${{ github.ref_name }}
          AUTHOR: ${{ github.actor }}
        run: |
          # 对结果进行简单的换行处理，防止企微消息格式错乱（可选）
          FORMATTED_RESULT=$(echo "$RESULT" | sed 's/\\/\\\\/g' | sed 's/"/\\"/g')
          
          curl -s "$WEBHOOK" \
            -H "Content-Type: application/json" \
            -d "{
              \"msgtype\": \"text\",
              \"text\": {
                \"content\": \"✅ AI 审查完成\n分支：${BRANCH}\n提交人：${AUTHOR}\n\n🔍 审查结果：\n${FORMATTED_RESULT}\"
              }
            }"
