name: AI Code Review + 企业微信推送
on:
  push:
    branches: [ dev, test, main, master ]

jobs:
  review:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 2 }

      - name: 获取代码差异
        id: diff
        run: |
          echo "content<<EOF" >> $GITHUB_OUTPUT
          git diff HEAD^ HEAD | head -300 >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: 通义千问 AI 审查（官方完整版）
        id: ai
        env:
          QWEN_KEY: ${{ secrets.OPENAI_API_KEY }}
          DIFF: ${{ steps.diff.outputs.content }}
        run: |
          curl -s https://dashscope.aliyuncs.com/api/v1/services/aigc/text-generation/generation \
            -H "Authorization: Bearer $QWEN_KEY" \
            -H "Content-Type: application/json" \
            -d '{
              "model": "qwen-plus",
              "input": {
                "messages": [
                  {
                    "role":"system",
                    "content":"你是专业的前端代码审查专家，请按照以下格式输出审查报告：\n1. 代码问题\n2. 潜在风险\n3. 规范建议\n4. 可优化点\n5. 安全性检查\n请使用中文，简洁专业，逐条列出。"
                  },
                  {
                    "role":"user",
                    "content":"请审查以下代码差异：\n'"$DIFF"'"
                  }
                ]
              },
              "parameters": {"max_tokens": 1200}
            }' > res.json

          result=$(jq -r '.output.text // "AI审查失败，请检查日志"' res.json)
          echo "result=$result" >> $GITHUB_OUTPUT
          cat res.json

      - name: 发送企业微信（完整报告）
        env:
          WEBHOOK: ${{ secrets.WECHAT_WEBHOOK }}
          RESULT: ${{ steps.ai.outputs.result }}
          BRANCH: ${{ github.ref_name }}
          AUTHOR: ${{ github.actor }}
          COMMIT: ${{ github.sha }}
        run: |
          curl -s "$WEBHOOK" \
            -H "Content-Type: application/json" \
            -d '{
            "msgtype": "text",
            "text": {
              "content": "📌 项目：'"$GITHUB_REPOSITORY"'\n📤 分支：'"$BRANCH"'\n👤 提交人：'"$AUTHOR"'\n🔖 提交ID：'"${COMMIT:0:10}"'\n━━━━━━━━━━━━━━━\n📝 AI 代码审查报告：\n'"$RESULT"'"
            }
          }'