name: AI Code Review + 企业微信推送
on:
  push:
    branches: [ dev, test, main, master ]

jobs:
  review:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with: 
          fetch-depth: 2

      - name: 获取代码差异
        id: diff
        run: |
          git diff HEAD^ HEAD > diff_output.txt
          head -n 300 diff_output.txt > diff_limited.txt

      - name: 通义千问 AI 审查 (安全版)
        id: ai
        env:
          QWEN_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          DIFF_CONTENT=$(cat diff_limited.txt)
          
          jq -n --arg diff "$DIFF_CONTENT" '{
            "model": "qwen-plus",
            "input": {
              "messages": [
                {
                  "role": "system",
                  "content": "你是资深前端代码审查专家，请按以下格式输出审查报告：\n1. 潜在 Bug\n2. 安全风险\n3. 性能优化建议\n4. 代码规范问题\n如果没有重大问题，回复「代码质量良好」。请用简洁中文，逐条列出。"
                },
                {"role": "user", "content": $diff}
              ]
            },
            "parameters": {"max_tokens": 1200}
          }' > payload.json

          RESPONSE=$(curl -s -X POST https://dashscope.aliyuncs.com/api/v1/services/aigc/text-generation/generation \
            -H "Authorization: Bearer $QWEN_KEY" \
            -H "Content-Type: application/json" \
            -d @payload.json)

          if echo "$RESPONSE" | jq -e '.output.text' > /dev/null 2>&1; then
            RESULT=$(echo "$RESPONSE" | jq -r '.output.text')
            echo "AI_RESULT=$RESULT" >> "$GITHUB_ENV"  # 改用环境变量
            echo "✅ AI 审查成功" || true
          else
            ERROR_MSG=$(echo "$RESPONSE" | jq -r '.message // .code // "未知错误"')
            echo "::error::AI 审查失败：$ERROR_MSG"
            echo "AI_RESULT=❌ AI 审查失败：$ERROR_MSG" >> "$GITHUB_ENV"
          fi

      - name: 发送企业微信（美化版）
        if: always()
        env:
          WEBHOOK: ${{ secrets.WECHAT_WEBHOOK }}
          RESULT: ${{ env.AI_RESULT }}  # 从环境变量读取
          BRANCH: ${{ github.ref_name }}
          AUTHOR: ${{ github.actor }}
          REPO: ${{ github.repository }}
          COMMIT: ${{ github.sha }}
        run: |
          FORMATTED_RESULT=$(echo "$RESULT" | sed 's/\\/\\\\/g' | sed 's/"/\\"/g' | sed 's/\n/\\n/g')
          
          curl -s "$WEBHOOK" \
            -H "Content-Type: application/json" \
            -d "{
              \"msgtype\": \"text\",
              \"text\": {
                \"content\": \"📌 项目：${REPO}\\n📤 分支：${BRANCH}\\n👤 提交人：${AUTHOR}\\n🔖 提交ID：${COMMIT:0:8}\\n━━━━━━━━━━━━━━━\\n📝 AI 代码审查报告：\\n${FORMATTED_RESULT}\"
              }
            }"