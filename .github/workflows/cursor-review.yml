name: AI Code Review + 企业微信推送
on:
  push:
    branches: [ dev, test, main, master ]

jobs:
  review:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with: 
          fetch-depth: 2

      - name: 获取代码差异
        run: |
          git diff HEAD^ HEAD > diff_output.txt
          head -n 300 diff_output.txt > diff_limited.txt

      - name: AI 审查 + 企业微信推送
        env:
          QWEN_KEY: ${{ secrets.OPENAI_API_KEY }}
          WEBHOOK: ${{ secrets.WECHAT_WEBHOOK }}
          BRANCH: ${{ github.ref_name }}
          AUTHOR: ${{ github.actor }}
          REPO: ${{ github.repository }}
          COMMIT: ${{ github.sha }}
        run: |
          DIFF_CONTENT=$(cat diff_limited.txt)

          # AI 请求
          jq -n --arg diff "$DIFF_CONTENT" '{
            "model": "qwen-plus",
            "input": {
              "messages": [
                {
                  "role": "system",
                  "content": "你是资深前端代码审查专家，请按以下格式输出审查报告：\n1. 潜在 Bug\n2. 安全风险\n3. 性能优化建议\n4. 代码规范问题\n请用简洁中文，逐条列出。"
                },
                {"role": "user", "content": $diff}
              ]
            },
            "parameters": {"max_tokens": 1200}
          }' > payload.json

          RESPONSE=$(curl -s -X POST https://dashscope.aliyuncs.com/api/v1/services/aigc/text-generation/generation \
            -H "Authorization: Bearer $QWEN_KEY" \
            -H "Content-Type: application/json" \
            -d @payload.json)

          if echo "$RESPONSE" | jq -e '.output.text' > /dev/null 2>&1; then
            RESULT=$(echo "$RESPONSE" | jq -r '.output.text')
          else
            ERROR_MSG=$(echo "$RESPONSE" | jq -r '.message // .code // "未知错误"')
            RESULT="❌ AI 审查失败：$ERROR_MSG"
          fi

          # 安全转义
          ESCAPED_RESULT=$(echo "$RESULT" | sed 's/\\/\\\\/g' | sed 's/"/\\"/g' | sed 's/\n/\\n/g')

          # 企业微信 JSON 格式输出（干净、标准、不会报错）
          curl -s "$WEBHOOK" \
            -H "Content-Type: application/json" \
            -d '{
              "msgtype": "text",
              "text": {
                "content": "📌 项目：'"${REPO}"'\n📤 分支：'"${BRANCH}"'\n👤 提交人：'"${AUTHOR}"'\n🔖 提交ID：'"${COMMIT:0:8}"'\n━━━━━━━━━━━━━━━\n📝 AI 代码审查报告：\n'"${ESCAPED_RESULT}"'"
              }
            }'